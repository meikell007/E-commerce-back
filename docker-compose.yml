# ============================================================
# docker-compose.yml — E-commerce Back + LocalStack
# ============================================================

services:

  # ----------------------------------------------------------
  # LocalStack (DynamoDB + Redis en un contenedor)
  # ----------------------------------------------------------
  ministack:
    image: ministackorg/ministack
    container_name: ministack
    ports:
      - "4566:4566"   # Puerto principal de LocalStack
    environment:
      - SERVICES=dynamodb
      - DEBUG=1
      - DATA_DIR=/tmp/ministack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "awslocal", "dynamodb", "list-tables"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ecommerce-net

  # ----------------------------------------------------------
  # Backend Spring Boot
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    ports:
      - "8087:8080"
    depends_on:
      ministack:
        condition: service_healthy
    environment:
      # ── DynamoDB Local ──────────────────────────────────────
      AWS_DYNAMODB_ENDPOINT: http://ministack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local

      # ── Redis ──────────────────────────────────────────────
      REDIS_HOST: redis
      REDIS_PORT: 6379

    networks:
      - ecommerce-net
    restart: unless-stopped

# ----------------------------------------------------------
# Redis
# ----------------------------------------------------------
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--save", "\"\"", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - ecommerce-net
# ----------------------------------------------------------
# Volúmenes
# ----------------------------------------------------------
volumes:
  redis_data:

networks:
  ecommerce-net:
    driver: bridge